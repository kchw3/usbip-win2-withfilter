# Copy to config.ini and fill in. config.ini is gitignored.
# The harness skips all integration tests if config.ini is missing.

[linux]
host = 192.168.56.10
user = root
# Either password or key_filename
password =
key_filename = ~/.ssh/id_ed25519
# Path to the test/linux dir ON THE SERVER (where gadget scripts were copied).
test_dir = /opt/usbip-filter-test/linux
# UDC + busid used for export (verify for your kernel; vudc vs dummy_hcd).
udc_name = usbip-vudc.0
busid = usbip-vudc.0
# Tier B raw_gadget only: the UDC's platform driver/device names passed to
# USB_RAW_IOCTL_INIT (NOT the USB/IP busid). Defaults are derived from udc_name
# (usbip_vudc / <udc_name>, else dummy_udc / dummy_udc.0). Override if your
# kernel names them differently.
# raw_udc_driver = usbip_vudc
# raw_udc_device = usbip-vudc.0

[windows]
host = 192.168.56.20
user = Administrator
password =
# WinRM transport: ntlm (default) or kerberos/credssp if configured.
transport = ntlm
# Path to helpers.ps1 ON THE WINDOWS CLIENT.
helpers = C:\usbip-filter-test\helpers.ps1
usbip_exe = C:\Program Files\USBip\usbip.exe

[server]
# How the Windows client reaches the USB/IP server (often == linux.host).
address = 192.168.56.10
# Optional; defaults to the standard USB/IP port (3240) if omitted.
port = 3240
