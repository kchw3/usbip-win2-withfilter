[pytest]
testpaths = .
python_files = test_*.py
addopts = -ra
markers =
    efficacy: destructive negative-control tests that execute real payloads on the
        client (filter OFF). Opt-in only: pass --run-efficacy to run them.
    tierb_canary: Raw Gadget bring-up canaries. Opt-in only: pass
        --run-tierb-canaries to run them.
